## 注：regions可以选择使用圆形区域或矩形区域
## 圆形区域：需要有x，y和max_lidar_distance_to_center_m参数（都是值）
## 矩形区域：需要有x_range，y_range（都是范围[]）



world:
  frame_id: map
  axis_aligned: true
  unit: meter

scene_manager:
  active_scene: mode_a   ## 蓝方
  allow_runtime_switch: false

corner_pool:
  c00: [1.55, -0.15]    ## blue矛头架远端
  c01: [0.0, -0.15]    ## blue矛头架贴场地最边缘
  c02: [0.0, -2.0]    ## blue_r2启动区处边缘点

  # c01: [0.0, 1.2]
  # c11: [1.2, 1.2]
  # c21: [2.4, 1.2]

wall_pool:
  shelf_wall:
    from: c00
    to: c01
    enabled: true
  edge_wall:
    from: c01
    to: c02
    enabled: true

  # east_00:
