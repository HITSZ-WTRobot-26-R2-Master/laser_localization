  #   to: c21
  #   enabled: true
  # east_10:
  #   from: c20
  #   to: c21
  #   enabled: true

wall_pair_candidates:
  spear_region_yaw-90:
    x_wall:
      wall: shelf_wall
      role: rear
    side_wall:
      wall: edge_wall
      role: right
    corner_world_pose:
      x: 0.0
      y: -0.15
      yaw_deg: -90.0
      


