scene_profiles:
  mode_a:
    constraints:
      orthogonal_required: true
      expected_span_m: 1.2
    wall_selector:
      yaw_tolerance_deg: 5.0
      regions:
        - name: spear_region_yaw-90
          x_range: [0.36, 1.4]       ## 距离矛头架两侧边缘10mm
          y_range: [-1.4, -0.15]
          yaw_deg: -90.0
          active_wall_pair: spear_region_yaw-90
          priority: 100
          
          
          
   
