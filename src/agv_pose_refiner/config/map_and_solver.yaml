      min_valid_corner_beams: 3
      max_theta_abs_deg: 45.0
      wall_hit_tolerance_m: 0.05
      wall_extent_margin_m: 0.08
      max_correction_xy_m: 0.15
      max_correction_yaw_deg: 10.0
      residual_thresh_m: 0.03
