# ⚠️ 警告：此文件在 Docker 运行时会被主仓库 config/laser/ 下的同名文件覆盖。
# 请勿在此修改配置 —— 所有激光定位配置变更请到主仓库 config/laser/ 目录进行。
# 此文件仅用于子模块独立开发/测试场景，不作为 RobotCon 实际运行配置。

sensor_mounts:
  front_center:
    pos: [0.25998, 0.000]
    dir: [1.0, 0.0]
    min_range_m: 0.03
    max_range_m: 2.00
  rear_center:
    pos: [-0.25998, 0.000]
    dir: [-1.0, 0.0]
    min_range_m: 0.03
    max_range_m: 2.00
  left_front:
    pos: [0.22908, 0.27493]
    dir: [0.0, 1.0]
    min_range_m: 0.03
    max_range_m: 2.00
  left_rear:
    pos: [-0.22908, 0.27493]
    dir: [0.0, 1.0]
    min_range_m: 0.03
    max_range_m: 2.00
  right_front:
    pos: [0.22908, -0.27493]
    dir: [0.0, -1.0]
    min_range_m: 0.03
    max_range_m: 2.00
  right_rear:
    pos: [-0.22908, -0.27493]
    dir: [0.0, -1.0]
    min_range_m: 0.03
    max_range_m: 2.00
