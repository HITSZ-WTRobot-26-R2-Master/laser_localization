# 此文件是 laser_localization 的 Docker 运行时传感器配置。
# 根仓库 docker-compose.yaml 会只读挂载整个 package config/ 目录。
#
# 配置来源说明：
#   - sensor_mounts: 传感器物理安装参数
#   - sensor_map:    逻辑传感器到物理设备的映射

sensor_mounts:
  front_center:
    pos: [0.25998, 0.000]
    dir: [1.0, 0.0]
    min_range_m: 0.01
    max_range_m: 20.00
  rear_center:
    pos: [-0.25998, 0.000]
    dir: [-1.0, 0.0]
    min_range_m: 0.01
    max_range_m: 20.00
  left_front:
    pos: [0.22908, 0.27493]
    dir: [0.0, 1.0]
    min_range_m: 0.01
    max_range_m: 20.00
  left_rear:
    pos: [-0.22908, 0.27493]
    dir: [0.0, 1.0]
    min_range_m: 0.01
    max_range_m: 20.00
  right_front:
    pos: [0.22908, -0.27493]
    dir: [0.0, -1.0]
    min_range_m: 0.01
    max_range_m: 20.00
  right_rear:
    pos: [-0.22908, -0.27493]
    dir: [0.0, -1.0]
    min_range_m: 0.01
    max_range_m: 20.00

sensor_map:
  front_center:
    device_id: 2
    slot_index: 1
  rear_center:
    device_id: 1
    slot_index: 3
  left_front:
    device_id: 2
    slot_index: 0
  left_rear:
    device_id: 1
    slot_index: 2
  right_front:
    device_id: 2
    slot_index: 2
  right_rear:
    device_id: 1
    slot_index: 0
