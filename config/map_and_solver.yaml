# ⚠️ 警告：此文件在 Docker 运行时会被主仓库 config/laser/ 下的同名文件覆盖。
# 请勿在此修改配置 —— 所有激光定位配置变更请到主仓库 config/laser/ 目录进行。
# 此文件仅用于子模块独立开发/测试场景，不作为 RobotCon 实际运行配置。

## 注：regions可以选择使用圆形区域或矩形区域
## 圆形区域：需要有x，y和max_lidar_distance_to_center_m参数（都是值）
## 矩形区域：需要有x_range，y_range（都是范围[]）



world:
  frame_id: map
  axis_aligned: true
  unit: meter

scene_manager:
  active_scene: mode_red   ## 红方
  allow_runtime_switch: false

