scene_profiles:
##------------红色---------------##
  mode_red:
    constraints:
      orthogonal_required: true
      expected_span_m: 1.2
    wall_selector:
      yaw_tolerance_deg: 10.0
      regions:
        - name: red_spear_region_yaw-90
          x_range: [0.36, 1.4]       ## 距离矛头架两侧边缘10mm
          y_range: [-1.4, -0.15]
          yaw_deg: -90.0
          active_wall_pair: red_spear_region_yaw-90
          priority: 100

        - name: red_forest02_region_yaw0
          x_range: [3.6, 4.0]
          y_range: [-3.2, -2.8]
          yaw_deg: 0.0
          active_wall_pair: red_forest02_region_yaw0
          priority: 100
        
        - name: red_forest02_region_yaw90
          x_range: [3.6, 4.0]
          y_range: [-3.2, -2.8]
          yaw_deg: 90.0
          active_wall_pair: red_forest02_region_yaw90
          priority: 100

        - name: red_forest02_region_yaw-90
          x_range: [3.6, 4.0]
          y_range: [-3.2, -2.8]
          yaw_deg: -90.0
          active_wall_pair: red_forest02_region_yaw-90
          priority: 100

        - name: red_forest04_region_yaw0
          x_range: [4.8, 5.2]
          y_range: [-4.4, -4.0]
          yaw_deg: 0.0
          active_wall_pair: red_forest04_region_yaw0
          priority: 100
        
        - name: red_forest04_region_yaw90
          x_range: [4.8, 5.2]
          y_range: [-4.4, -4.0]
          yaw_deg: 90.0
