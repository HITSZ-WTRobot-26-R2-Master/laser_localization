# RobotCon Docker runtime uses this package-local file for map and solver
# configuration. Keep world geometry, wall pairs, scene profiles, and solver
# tuning changes here.
# Optional: each region may define range_offsets_m in meters, keyed by sensor
# name, to add/subtract a fixed value from selected laser ranges. Omitted
# sensors default to 0.0 offset.

## 注：regions可以选择使用圆形区域或矩形区域
## 圆形区域：需要有x，y和max_lidar_distance_to_center_m参数（都是值）
## 矩形区域：需要有x_range，y_range（都是范围[]）



world:
  frame_id: map
  axis_aligned: true
  unit: meter

scene_manager:
  active_scene: mode_red   ## 红方
  allow_runtime_switch: false










